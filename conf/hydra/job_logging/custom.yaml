version: 1
disable_existing_loggers: false

formatters:
  simple:
    format: "[%(levelname)s @%(name)s]: %(message)s"
  error-simple:
    format: "[STDERR: %(levelname)s %(asctime)s %(filename)s:%(lineno)d]"

handlers:
  stdout:
    class: logging.StreamHandler
    level: DEBUG
    formatter: simple
    stream: ext://sys.stdout
  stderr:
    class: logging.StreamHandler
    level: ERROR
    formatter: error-simple
    stream: ext://sys.stderr

loggers:
  persuasion_bias:
    level: DEBUG
    propagate: yes
  urllib3:
    level: WARNING
    propagate: yes
  filelock:
    level: WARNING
    propagate: yes
  fsspec:
    level: WARNING
    propagate: yes
  datasets:
    level: WARNING
    propagate: yes
  chromadb:
    level: WARNING
    propagate: yes
  sentence_transformers:
    level: WARNING
    propagate: yes
  openai:
    level: WARNING
    propagate: yes
  httpcore:
    level: WARNING
    propagate: yes
  httpx:
    level: WARNING
    propagate: yes

root:
  level: DEBUG
  handlers:
    - stdout
    - stderr