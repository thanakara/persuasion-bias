name: lint

permissions:
    contents: read

on:
    push:
        branches-ignore:
            - main
    pull_request:
        branches:
            - main

jobs:
    lint_job:
        name: lint job
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - uses: ./.github/actions/uv_setup

            - name: make all
              run: |
                  make lint
